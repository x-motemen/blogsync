name: release
description: release blogsync
inputs:
  tag:
    description: tag name to be released
    default: ''
  token:
    description: GitHub token
    required: true
runs:
  using: composite
  steps:
  - name: setup go
    uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
    with:
      go-version-file: go.mod
  - name: release
    run: |
      make crossbuild
    shell: bash
    env:
      GITHUB_TOKEN: ${{ inputs.token }}
  - uses: tcnksm/ghr@766f869eacbbb086e8860cf0f0192dda6e8e67e1 # v0.18.3
    with:
      tag: ${{ inputs.tag }}
      token: ${{ inputs.token }}
      path: "dist"
  - uses: haya14busa/action-update-semver@7d2c558640ea49e798d46539536190aff8c18715 # v1.5.1
    with:
      major_version_tag_only: true
      tag: ${{ inputs.tag }}
