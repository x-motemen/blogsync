name: test
on:
  pull_request:
    branches:
    - "**"
  push:
    branches:
    - master
jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - macOS-latest
        - windows-latest
    steps:
    - name: Set git to use LF
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf
      if: "matrix.os == 'windows-latest'"
    - name: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: setup go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - name: test
      run: go test -coverprofile coverage.out -covermode atomic ./...
      env:
        BLOGSYNC_TEST_BLOG: ${{ matrix.os == 'macOS-latest' && 'blogsynctest.hatenablog.com' || '' }}
        BLOGSYNC_USERNAME: Songmu
        BLOGSYNC_PASSWORD: ${{ secrets.BLOGSYNC_SONGMU_PASSWORD }}
    - name: Send coverage
      uses: shogo82148/actions-goveralls@9606dbc5ac5cf888a0e9ef901515c3cd516a2790 # v1.11.0
      with:
        github-token: ${{ secrets.github_token }}
        path-to-profile: coverage.out
        parallel: true
        flag-name: ${{ matrix.os }}
  finish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    needs: test
    steps:
    - name: finish coverage report
      uses: shogo82148/actions-goveralls@9606dbc5ac5cf888a0e9ef901515c3cd516a2790 # v1.11.0
      with:
        github-token: ${{ secrets.github_token }}
        parallel-finished: true
